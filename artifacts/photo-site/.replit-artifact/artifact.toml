kind = "web"
previewPath = "/"
title = "Photo Site"
version = "1.0.0"
id = "artifacts/photo-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24544

[services.development]
run = "pnpm --filter @workspace/photo-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/photo-site", "run", "build" ]
publicDir = "artifacts/photo-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24544"
BASE_PATH = "/"
